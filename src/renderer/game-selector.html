<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="game_selector.page_title">选择游戏 - Mod Manager</title>
    <!-- Favicon -->
    <link rel="icon" href="assets/icon.ico">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    <script src="js/i18n.js"></script>
    <script>
        (function () {
            var lang = localStorage.getItem('app_language') || 'zh-CN';
            var supported = ['zh-CN', 'en', 'ja'];
            if (!supported.includes(lang)) lang = 'zh-CN';
            document.documentElement.lang = lang;
            document.write('<scr' + 'ipt src="js/locales/' + lang + '.js"></scr' + 'ipt>');
        })();
    </script>
    <script src="js/locales/extra.js"></script>
    <script src="js/locales/ui-extra.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap');

        :root {
            --card-scale: 1;
            --bg-base: #0a0a0f;
            --accent-primary: #7aa2f7;
            --accent-secondary: #9d7cd8;
            --glass-bg: rgba(20, 22, 33, 0.4);
            --glass-border: rgba(255, 255, 255, 0.06);
            --text-primary: #f8f8f2;
            --text-secondary: #a9b1d6;
        }

        body {
            background-color: var(--bg-base);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-primary);
        }

        /* --- Ambient Animated Background --- */
        .ambient-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            animation: floatOrb 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--accent-primary) 0%, transparent 70%);
            top: -20vh;
            left: -10vw;
        }

        .orb-2 {
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, var(--accent-secondary) 0%, transparent 70%);
            bottom: -20vh;
            right: -10vw;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #f7768e 0%, transparent 70%);
            top: 40vh;
            left: 40vw;
            opacity: 0.08;
            animation-delay: -10s;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(5vw, 5vh) scale(1.1);
            }

            100% {
                transform: translate(-3vw, -2vh) scale(0.95);
            }
        }

        /* --- Title Bar --- */
        #title-bar {
            -webkit-app-region: drag;
            user-select: none;
            display: flex;
            align-items: center;
            width: 100%;
            height: 48px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1000;
            padding: 0 1rem;
            box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(10, 10, 15, 0.9) 0%, transparent 100%);
        }

        .window-controls {
            -webkit-app-region: no-drag;
            z-index: 1001;
            display: flex;
            gap: 12px;
        }

        .control-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 6px;
            font-size: 14px;
            border-radius: 6px;
        }

        .control-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .control-btn.close-btn-window:hover {
            color: #fff;
            background: #f7768e;
        }

        /* --- Layout Container --- */
        .game-selector-container {
            z-index: 10;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
            box-sizing: border-box;
        }

        /* --- Header Section --- */
        .header-section {
            width: 100%;
            max-width: 1600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
            padding: 0 2rem;
            box-sizing: border-box;
            position: relative;
        }

        .main-title {
            font-size: 3rem;
            margin: 0 0 1.5rem 0;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 20%, #7aa2f7 80%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.03em;
            filter: drop-shadow(0 4px 25px rgba(122, 162, 247, 0.25));
            animation: floatTitle 6s ease-in-out infinite alternate;
        }

        @keyframes floatTitle {
            0% {
                transform: translateY(0);
                filter: drop-shadow(0 4px 15px rgba(122, 162, 247, 0.2));
            }

            100% {
                transform: translateY(-4px);
                filter: drop-shadow(0 8px 25px rgba(122, 162, 247, 0.4));
            }
        }

        /* Glassmorphic Control Capsule */
        .controls-capsule {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            background: rgba(15, 17, 26, 0.55);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .scale-slider-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 140px;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--text-primary);
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(122, 162, 247, 0.6);
            transition: transform 0.2s;
        }

        input[type=range]:active::-webkit-slider-thumb {
            transform: scale(1.2);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        .layout-controls {
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px;
            border-radius: 30px;
        }

        .layout-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .layout-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .layout-btn.active {
            color: var(--bg-base);
            background: var(--text-primary);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
        }

        /* --- Games Grid Area --- */
        .games-scroll-wrapper {
            flex: 1;
            width: 100%;
            max-width: 1800px;
            overflow-y: auto;
            padding: 1rem 0 3rem 0;

            /* Modern Scrollbar */
            scrollbar-width: thin;
            scrollbar-color: rgba(122, 162, 247, 0.2) transparent;
            mask-image: linear-gradient(to bottom, transparent, black 2%, black 95%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 2%, black 95%, transparent);
        }

        .games-scroll-wrapper::-webkit-scrollbar {
            width: 6px;
        }

        .games-scroll-wrapper::-webkit-scrollbar-track {
            background: transparent;
        }

        .games-scroll-wrapper::-webkit-scrollbar-thumb {
            background-color: rgba(122, 162, 247, 0.2);
            border-radius: 10px;
        }

        .games-scroll-wrapper::-webkit-scrollbar-thumb:hover {
            background-color: rgba(122, 162, 247, 0.4);
        }

        .games-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: calc(3rem * var(--card-scale));
            padding: 2rem;
            width: 100%;
            box-sizing: border-box;
            perspective: 2000px;
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .games-grid.fade-out {
            opacity: 0;
            transform: translateY(20px) scale(0.97);
        }

        /* --- Premium Game Card (Grid Layout) --- */
        .game-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            /* 3D Transform is handled mostly via JS, but setup transitions here */
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            text-align: left;
            width: calc(360px * var(--card-scale));
            display: flex;
            flex-direction: column;
            transform-style: preserve-3d;
            opacity: 0;
            animation: slideUpFadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes slideUpFadeIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Animated Glowing Border Effect using ::before */
        .game-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 26px;
            background: conic-gradient(from 0deg, transparent 70%, var(--accent-primary) 85%, var(--accent-secondary) 100%);
            z-index: -1;
            animation: rotateBorder 4s linear infinite;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        @keyframes rotateBorder {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .game-card:hover {
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), 0 0 40px rgba(122, 162, 247, 0.15);
            border-color: transparent;
            background: rgba(26, 30, 46, 0.7);
        }

        .game-card:hover::before {
            opacity: 1;
        }

        .game-card-image {
            height: calc(240px * var(--card-scale));
            width: 100%;
            object-fit: cover;
            background-color: #111217;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transform: translateZ(20px);
            /* 3D pop out */
        }

        .game-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), filter 0.4s ease;
        }

        .game-card:hover .game-card-image img {
            transform: scale(1.05);
            filter: brightness(0.7);
        }

        /* Hover Overlay inside Image */
        .game-card-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.6) 0%, transparent 100%);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform: translateY(10px);
        }

        .game-card:hover .game-card-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        .play-btn-visual {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transform: scale(0.8);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .game-card:hover .play-btn-visual {
            transform: scale(1);
        }

        .game-card-image.placeholder {
            background-image: linear-gradient(135deg, #161822 0%, #1a1b26 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-card-image.placeholder i {
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .game-card:hover .game-card-image.placeholder i {
            color: var(--accent-primary);
            transform: scale(1.1) translateY(-10px);
            text-shadow: 0 10px 30px rgba(122, 162, 247, 0.4);
        }

        .game-card-content {
            padding: calc(1.5rem * var(--card-scale));
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            transform: translateZ(10px);
            /* 3D effect layer */
        }

        .game-title {
            font-size: calc(1.6rem * var(--card-scale));
            font-weight: 700;
            background: linear-gradient(to right, #fff, var(--text-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
        }

        .game-desc {
            font-size: calc(0.95rem * var(--card-scale));
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-weight: 400;
        }

        /* --- List Layout Styles --- */
        .games-grid.no-transition .game-card,
        .games-grid.no-transition .game-card-image,
        .games-grid.no-transition .game-card-image img {
            transition: none !important;
        }

        .games-grid.layout-list {
            flex-direction: column;
            align-items: center;
            gap: calc(1.5rem * var(--card-scale));
        }

        .games-grid.layout-list .game-card {
            width: 100%;
            max-width: 1100px;
            flex-direction: row;
            height: calc(160px * var(--card-scale));
            background: linear-gradient(90deg, rgba(20, 22, 33, 0.6) 0%, rgba(15, 17, 26, 0.4) 100%);
            border-radius: 20px;
            transform: none !important;
            /* Disable JS 3D tilt for list view */
            transition: all 0.3s ease;
        }

        .games-grid.layout-list .game-card::before {
            display: none;
            /* No rotating border for list */
        }

        .games-grid.layout-list .game-card:hover {
            transform: translateX(10px) !important;
            background: linear-gradient(90deg, rgba(30, 34, 51, 0.7) 0%, rgba(20, 22, 33, 0.5) 100%);
            border-color: rgba(122, 162, 247, 0.3);
            box-shadow: -10px 15px 30px rgba(0, 0, 0, 0.2);
        }

        .games-grid.layout-list .game-card-image {
            width: calc(300px * var(--card-scale));
            height: 100%;
            border-bottom: none;
            -webkit-mask-image: linear-gradient(to right, black 60%, transparent 100%);
            mask-image: linear-gradient(to right, black 60%, transparent 100%);
            transform: none;
        }

        .games-grid.layout-list .game-card-overlay {
            background: linear-gradient(to right, rgba(0, 0, 0, 0.5) 0%, transparent 100%);
            justify-content: flex-start;
            padding-left: 2rem;
            transform: translateX(-10px);
        }

        .games-grid.layout-list .game-card:hover .game-card-overlay {
            transform: translateX(0);
        }

        .games-grid.layout-list .game-card-content {
            padding: 1.5rem 2.5rem 1.5rem 0;
            align-items: flex-start;
            justify-content: center;
            text-align: left;
            position: relative;
            flex-grow: 1;
            transform: none;
        }

        .games-grid.layout-list .game-title {
            font-size: calc(2rem * var(--card-scale));
            margin-bottom: 0.5rem;
        }

        .games-grid.layout-list .game-desc {
            font-size: calc(1.05rem * var(--card-scale));
            -webkit-line-clamp: 2;
            line-clamp: 2;
            max-width: 90%;
            margin-bottom: 0;
        }

        /* --- Premium Edit Modal --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .modal.show {
            opacity: 1;
        }

        .modal-content {
            background: linear-gradient(160deg, rgba(30, 34, 48, 0.95) 0%, rgba(20, 22, 33, 0.98) 100%);
            padding: 2.5rem;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 480px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: scale(0.9) translateY(20px);
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            overflow: hidden;
        }

        .modal-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 150px;
            background: radial-gradient(ellipse at top, rgba(122, 162, 247, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        .modal.show .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal h2 {
            margin-top: 0;
            margin-bottom: 2rem;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .form-group {
            margin-bottom: 1.8rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input[type="text"] {
            width: 100%;
            padding: 1rem 1.2rem;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-primary);
            box-sizing: border-box;
            font-size: 1.05rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-group input[type="text"]:focus {
            outline: none;
            background: rgba(0, 0, 0, 0.5);
            border-color: rgba(122, 162, 247, 0.5);
            box-shadow: 0 0 0 4px rgba(122, 162, 247, 0.1);
        }

        .image-preview {
            width: 100%;
            height: 200px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .image-preview:hover {
            border-color: var(--accent-primary);
            background: rgba(122, 162, 247, 0.05);
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .image-preview:hover img {
            transform: scale(1.05);
            filter: brightness(0.8);
        }

        .image-preview::after {
            content: '\f03e';
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            opacity: 0;
            transition: opacity 0.3s;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            font-size: 1.1rem;
        }

        .image-preview:hover::after {
            opacity: 1;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2.5rem;
        }

        .btn-cancel,
        .btn-confirm {
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            font-family: inherit;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
        }

        .btn-cancel:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-confirm {
            background: var(--text-primary);
            color: var(--bg-base);
            box-shadow: 0 10px 20px -5px rgba(255, 255, 255, 0.2);
        }

        .btn-confirm:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -5px rgba(255, 255, 255, 0.3);
            background: #fff;
        }
    </style>
</head>

    <body data-theme="tokyo-night">

        <!-- Ambient Animated Background -->
        <div class="ambient-background">
            <div class="bg-orb orb-1"></div>
            <div class="bg-orb orb-2"></div>
            <div class="bg-orb orb-3"></div>
        </div>

        <!-- Title Bar -->
        <div id="title-bar">
            <div class="app-icon"
                style="margin-left: 10px; margin-right: 10px; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;">
                <img src="assets/icon.ico" style="width: 100%; height: 100%;">
            </div>
            <div class="app-title" style="color: #a9b1d6; font-size: 14px; font-family: sans-serif;"
                data-i18n="game_selector.app_title">Mod Manager - Game Select</div>
            <div id="title-drag-region" style="flex-grow: 1; height: 100%;"></div>
            <div class="window-controls" style="margin-left: auto; padding-right: 10px;">
                <button id="min-btn" class="control-btn" data-i18n-title="window.minimize" title="最小化"><i class="fas fa-minus"></i></button>
                <button id="close-btn" class="control-btn close-btn-window" data-i18n-title="window.close" title="关闭"><i
                        class="fas fa-times"></i></button>
            </div>
        </div>

        <div class="game-selector-container">

            <!-- Header Section -->
            <div class="header-section">
                <h1 class="main-title" data-i18n="game_selector.main_title">选择游戏</h1>

                <!-- Glassmorphic Controls Capsule -->
                <div class="controls-capsule">
                    <!-- Scale Slider -->
                    <div class="scale-slider-wrapper">
                        <i class="fas fa-search-minus" style="color: var(--text-secondary); font-size: 0.9rem;"
                            data-i18n-title="game_selector.scale.decrease" title="缩小"></i>
                        <input type="range" id="card-scale-slider" min="50" max="150" value="100"
                            data-i18n-title="game_selector.scale.adjust" title="调整缩放">
                        <i class="fas fa-search-plus" style="color: var(--text-secondary); font-size: 0.9rem;"
                            data-i18n-title="game_selector.scale.increase" title="放大"></i>
                    </div>

                    <!-- Layout Switcher -->
                    <div class="layout-controls">
                        <button class="layout-btn active" id="btn-layout-grid" onclick="switchLayout('grid')"
                            data-i18n-title="game_selector.layout.grid" title="网格视图">
                            <i class="fas fa-th-large"></i>
                        </button>
                        <button class="layout-btn" id="btn-layout-list" onclick="switchLayout('list')"
                            data-i18n-title="game_selector.layout.list" title="列表视图">
                            <i class="fas fa-list"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="games-scroll-wrapper">
                <div class="games-grid" id="games-grid">
                    <!-- Games will be injected here dynamically -->
                </div>
            </div>
        </div>

        <!-- Edit Game Modal -->
        <div id="editGameModal" class="modal">
            <div class="modal-content">
                <h2 data-i18n="game_selector.edit.title">编辑游戏信息</h2>

                <div class="form-group">
                    <label data-i18n="game_selector.edit.name_label">游戏名称 (Display Name)</label>
                    <input type="text" id="editGameName" data-i18n-placeholder="game_selector.edit.name_placeholder"
                        placeholder="例如: Stellar Blade">
                </div>

                <div class="form-group">
                    <label data-i18n="game_selector.edit.desc_label">描述 / 别名 (Alt Name)</label>
                    <input type="text" id="editGameDesc" data-i18n-placeholder="game_selector.edit.desc_placeholder"
                        placeholder="例如: 剑星">
                </div>

                <div class="form-group">
                    <label data-i18n="game_selector.edit.cover_label">封面图片 (点击更改)</label>
                    <div class="image-preview" id="editGameImagePreview" onclick="triggerImageSelect()">
                        <span style="color:rgba(255,255,255,0.3); font-weight: 500;"
                            data-i18n="game_selector.edit.cover_select">点击选择图片</span>
                    </div>
                    <input type="text" id="editGameImagePath" style="display:none;">
                </div>

                <div class="modal-actions">
                    <button class="btn-cancel" onclick="closeEditModal()" data-i18n="btn.cancel">取消</button>
                    <button class="btn-confirm" onclick="saveGameDetails()"
                        data-i18n="game_selector.edit.save">保存更改</button>
                </div>
            </div>
        </div>

        <script src="js/game-selector.js"></script>
    </body>

</html>
