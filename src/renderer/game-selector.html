<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="game_selector.page_title">选择游戏 - Mod Manager</title>
    <link rel="icon" href="assets/icon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/game-selector.css">
    <style>
        body[data-theme-pending="true"] {
            visibility: hidden;
        }
    </style>
    <script>
        (function () {
            function applyScaling() {
                const baselineWidth = 1920;
                const baseFontSize = 10;
                const screenWidth = window.innerWidth;
                let scaleFactor = screenWidth / baselineWidth;

                if (scaleFactor < 0.85) scaleFactor = 0.85;
                if (scaleFactor > 1.2) scaleFactor = 1.2;

                const newSize = baseFontSize * scaleFactor;
                document.documentElement.style.fontSize = newSize + 'px';
            }
            applyScaling();
            window.addEventListener('resize', applyScaling);
        })();
    </script>
    <script src="js/i18n/i18n.js"></script>
    <script>
        (function () {
            var lang = localStorage.getItem('app_language') || 'zh-CN';
            var supported = ['zh-CN', 'en', 'ja'];
            if (!supported.includes(lang)) lang = 'zh-CN';
            document.documentElement.lang = lang;
            document.write('<scr' + 'ipt src="js/i18n/locales/' + lang + '.js"></scr' + 'ipt>');
        })();
    </script>
    <script src="js/i18n/locales/extra.js"></script>
    <script src="js/i18n/locales/ui-extra.js"></script>
    <!-- Theme Manager -->
    <script src="js/features/theme.js"></script>
</head>

<body class="gs-page" data-theme="light" data-theme-pending="true">
    <script>
        (function () {
            var theme = localStorage.getItem('app_theme') || 'light';
            if (theme === 'tokyo-night' || theme === 'default') theme = 'dark';
            if (theme !== 'dark' && theme !== 'light') theme = 'light';
            document.body.dataset.theme = theme;
            delete document.body.dataset.themePending;
        })();
    </script>
    <!-- Custom Title Bar -->
    <div id="title-bar">
        <div id="title-drag-region"></div>
        <div class="window-title">
            <img src="assets/icon.ico" alt="icon">
            <span id="window-title-text" data-i18n="game_selector.app_title">Mod Manager - 游戏选择</span>
        </div>
        <div class="window-controls">
            <button id="min-btn" class="control-btn" data-i18n-title="window.minimize" title="Minimize"><i class="fas fa-minus"></i></button>
            <button id="max-btn" class="control-btn" data-i18n-title="window.max_restore" title="Maximize / Restore"><i class="far fa-square"></i></button>
            <button id="close-btn" class="control-btn close-btn-window" data-i18n-title="window.close" title="Close"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <!-- Backgrounds -->
    <div id="animated-background"></div>
    <div id="fixed-background-layer"></div>

    <!-- Global loading indicator -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="simple-spinner"></div>
        <span class="loading-text" data-i18n="loading.processing">Processing...</span>
    </div>

    <!-- Toast notification container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Main Layout Container -->
    <div class="app-layout">
        <!-- Main Content -->
        <main class="main-content" style="padding-left: 2rem; padding-right: 2rem; padding-bottom: 2rem;">
            <div class="top-controls-panel" style="margin-bottom: 1.5rem; padding: 1.2rem 1.5rem; border-radius: 16px; background: var(--surface-color); border: 1px solid var(--border-color); backdrop-filter: blur(12px);">
                <div class="top-controls-row" style="margin-bottom: 1rem;">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <h1 class="gs-title" data-i18n="game_selector.main_title" style="margin: 0; font-size: 1.6rem;">选择游戏</h1>
                    </div>

                    <div class="header-filters" style="margin-left: auto;">
                        <button class="neon-button primary" onclick="openAddModal()">
                            <i class="fas fa-plus"></i> <span data-i18n="game_selector.add.button">添加游戏</span>
                        </button>
                    </div>
                </div>

                <div class="top-controls-row bottom-row" style="padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.05);">
                    <div class="tags-filter-container">
                        <div class="gs-layout" role="group" aria-label="Layout Switcher">
                            <button class="layout-btn active" id="btn-layout-grid" onclick="switchLayout('grid')"
                                data-i18n-title="game_selector.layout.grid" title="网格视图">
                                <i class="fas fa-th-large"></i>
                            </button>
                            <button class="layout-btn" id="btn-layout-list" onclick="switchLayout('list')"
                                data-i18n-title="game_selector.layout.list" title="列表视图">
                                <i class="fas fa-list"></i>
                            </button>
                        </div>
                    </div>

                    <div class="sort-container" style="display: flex; align-items: center; gap: 1rem; color: var(--text-secondary);">
                        <i class="fas fa-search-minus" data-i18n-title="game_selector.scale.decrease" title="缩小" style="cursor: pointer;" onclick="document.getElementById('card-scale-slider').stepDown(); document.getElementById('card-scale-slider').dispatchEvent(new Event('input'))"></i>
                        <input type="range" id="card-scale-slider" min="70" max="160" value="100"
                            data-i18n-title="game_selector.scale.adjust" title="调整卡片尺寸与间距" style="width: 150px; accent-color: var(--accent-blue);">
                        <i class="fas fa-search-plus" data-i18n-title="game_selector.scale.increase" title="放大" style="cursor: pointer;" onclick="document.getElementById('card-scale-slider').stepUp(); document.getElementById('card-scale-slider').dispatchEvent(new Event('input'))"></i>
                    </div>
                </div>
            </div>

            <div class="mod-list-scroll-area gs-content">
                <div class="games-grid" id="games-grid" aria-live="polite"></div>
            </div>
        </main>
    </div>

    <div id="editGameModal" class="modal">
        <div class="modal-content wide" style="max-width: 800px;">
            <span class="close-button" onclick="closeEditModal()">&times;</span>
            <h2 data-i18n="game_selector.edit.title">编辑游戏信息</h2>

            <div class="settings-card">
                <h3><i class="fas fa-info-circle"></i> 基本信息</h3>
                <div class="background-controls-grid">
                    <div class="form-group">
                        <label data-i18n="game_selector.edit.name_label">游戏名称 (Display Name)</label>
                        <input type="text" id="editGameName" data-i18n-placeholder="game_selector.edit.name_placeholder"
                            placeholder="例如: Stellar Blade">
                    </div>

                    <div class="form-group">
                        <label data-i18n="game_selector.edit.desc_label">描述 / 别名 (Alt Name)</label>
                        <input type="text" id="editGameDesc" data-i18n-placeholder="game_selector.edit.desc_placeholder"
                            placeholder="例如: 剑星">
                    </div>
                </div>
                
                <div class="background-controls-grid">
                    <div class="form-group">
                        <label>游戏 ID (系统内部标识)</label>
                        <input type="text" id="editGameId" readonly style="opacity: 0.7;">
                    </div>

                    <div class="form-group">
                        <label>可执行文件名</label>
                        <input type="text" id="editGameExecutable" placeholder="例如: SB.exe">
                    </div>
                </div>
            </div>

            <div class="settings-card">
                <h3><i class="fas fa-link"></i> 资源与封面</h3>
                <div class="form-group">
                    <label>Nexus Mods 链接</label>
                    <input type="text" id="editGameNexusUrl" placeholder="https://www.nexusmods.com/...">
                </div>

                <div class="form-group">
                    <label data-i18n="game_selector.edit.cover_label">封面图片 (点击更改)</label>
                    <div class="image-preview" id="editGameImagePreview" onclick="triggerImageSelect()">
                        <span data-i18n="game_selector.edit.cover_select">点击选择图片</span>
                    </div>
                    <input type="text" id="editGameImagePath" hidden>
                </div>
            </div>

            <div class="form-actions" style="margin-top: 1rem; display: flex; justify-content: flex-end; gap: 1rem;">
                <button class="neon-button secondary" onclick="closeEditModal()" data-i18n="btn.cancel">取消</button>
                <button class="neon-button" onclick="saveGameDetails()"><i class="fas fa-save"></i> <span data-i18n="game_selector.edit.save">保存更改</span></button>
            </div>
        </div>
    </div>

    <div id="addGameModal" class="modal">
        <div class="modal-content wide" style="max-width: 800px;">
            <span class="close-button" onclick="closeAddModal()">&times;</span>
            <h2 data-i18n="game_selector.add.title">添加游戏</h2>

            <div class="settings-card">
                <h3><i class="fas fa-plus-circle"></i> 基础配置</h3>
                <div class="background-controls-grid">
                    <div class="form-group">
                        <label data-i18n="game_selector.add.name_label">游戏名称</label>
                        <input type="text" id="addGameName" data-i18n-placeholder="game_selector.add.name_placeholder"
                            placeholder="例如: Black Myth: Wukong">
                    </div>

                    <div class="form-group">
                        <label data-i18n="game_selector.add.desc_label">描述 / 别名</label>
                        <input type="text" id="addGameDesc" data-i18n-placeholder="game_selector.add.desc_placeholder"
                            placeholder="可选描述">
                    </div>
                </div>

                <div class="background-controls-grid">
                    <div class="form-group">
                        <label data-i18n="game_selector.add.id_label">游戏 ID（可选）</label>
                        <input type="text" id="addGameId" data-i18n-placeholder="game_selector.add.id_placeholder"
                            placeholder="留空自动生成">
                    </div>

                    <div class="form-group">
                        <label data-i18n="game_selector.add.exe_label">可执行文件名</label>
                        <input type="text" id="addGameExecutable" data-i18n-placeholder="game_selector.add.exe_placeholder"
                            placeholder="例如: b1.exe">
                    </div>
                </div>
            </div>

            <div class="settings-card">
                <h3><i class="fas fa-image"></i> 更多选项</h3>
                <div class="form-group">
                    <label>Nexus Mods 链接（可选）</label>
                    <input type="text" id="addGameNexusUrl" placeholder="https://www.nexusmods.com/...">
                </div>

                <div class="form-group">
                    <label data-i18n="game_selector.add.cover_label">封面图片（可选）</label>
                    <div class="image-preview" id="addGameImagePreview"
                        onclick="triggerImageSelect('addGameImagePath', 'addGameImagePreview')">
                        <span data-i18n="game_selector.add.cover_select">点击选择图片</span>
                    </div>
                    <input type="text" id="addGameImagePath" hidden>
                </div>
            </div>

            <div class="form-actions" style="margin-top: 1rem; display: flex; justify-content: flex-end; gap: 1rem;">
                <button class="neon-button secondary" onclick="closeAddModal()" data-i18n="btn.cancel">取消</button>
                <button class="neon-button" onclick="saveNewGame()"><i class="fas fa-plus"></i> <span data-i18n="btn.add">添加</span></button>
            </div>
        </div>
    </div>

    <script src="js/features/game-selector.js"></script>
</body>

</html>
